<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Shop Acc Blox Fruit</title>

            border-radius: 10px;

            width: 250px;
        }
        button {
            background: orange;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Acc túi mù</h2>
        <p>Giá: 5000đ</p>
        <button onclick="buy()">Mua ngay</button>
    </div>

    <div class="card">
        <h2>Acc VIP</h2>
        <p>Giá: 100000đ</p>
        <button onclick="buy()">Mua ngay</button>
    </div>

    <script>
        function buy() {
            alert("Chuyển khoản:\nSTK: 123456789\nNgân hàng: MB Bank\nSau đó inbox admin để nhận acc!");
        }
    </script>

</body>
</html>
